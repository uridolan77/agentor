name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Agentor.sln

      - name: Build
        run: dotnet build Agentor.sln --no-restore --configuration Release

      - name: Install dotnet-ef (migration inventory)
        run: dotnet tool install --global dotnet-ef --version 9.0.4

      - name: List EF Core migrations
        run: dotnet ef migrations list --project src/Agentor.Infrastructure/Agentor.Infrastructure.csproj --startup-project src/Agentor.Api/Agentor.Api.csproj --configuration Release --no-build

      - name: Test (Release + TRX)
        run: dotnet test Agentor.sln --no-build --configuration Release --logger "trx;LogFileName=AgentorTests.trx" --results-directory "${{ github.workspace }}/artifacts/test-results"

      - name: Evaluation regression slice
        run: dotnet test Agentor.sln --no-build --configuration Release --filter "FullyQualifiedName~Agentor.Application.Tests.Evaluation"

      - name: Evaluation CI artifacts (Phase 32 PR127)
        env:
          AGENTOR_EVAL_CI_OUT: ${{ github.workspace }}/artifacts/evaluation
        run: pwsh ./scripts/generate-evaluation-ci-artifacts.ps1

      - name: Upload evaluation CI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentor-evaluation-reports
          path: artifacts/evaluation/

      - name: Benchmark project compile (release baseline harness)
        run: dotnet build benchmarks/Agentor.Benchmarks/Agentor.Benchmarks.csproj --configuration Release --no-restore

      - name: Verify harness (phase 32 PR127)
        run: pwsh ./scripts/verify-harness.ps1 -ExpectedPhase 32 -ExpectedHarnessPass PR127

      - name: Verify repository cleanliness
        run: pwsh ./scripts/verify-repo-clean.ps1

      - name: Docker build (Agentor.Api image)
        run: docker build -t agentor:ci .

      - name: Upload test results (TRX)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentor-tests-trx
          path: artifacts/test-results/